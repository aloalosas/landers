<!-- @dsCard group="Spacing" viewport="700x180" name="Radii" subtitle="From 4px chips to 20px cards & full-round" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="../styles.css" rel="stylesheet">
<style>
  body { margin:0; background:var(--fc-bg); color:var(--fc-white); font-family:var(--font-sans); padding:24px; }
  .row { display:flex; gap:18px; align-items:flex-end; }
  .sw { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { width:72px; height:72px; background:var(--fc-surface-1); border:1px solid var(--fc-line); }
  .n { font-size:11px; color:var(--fc-text-mute); font-family:var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="box" style="border-radius:var(--r-xs);"></div><div class="n">xs · 4</div></div>
    <div class="sw"><div class="box" style="border-radius:var(--r-sm);"></div><div class="n">sm · 6</div></div>
    <div class="sw"><div class="box" style="border-radius:var(--r-md);"></div><div class="n">md · 8</div></div>
    <div class="sw"><div class="box" style="border-radius:var(--r-lg);"></div><div class="n">lg · 12</div></div>
    <div class="sw"><div class="box" style="border-radius:var(--r-xl);"></div><div class="n">xl · 20</div></div>
    <div class="sw"><div class="box" style="border-radius:var(--r-round);"></div><div class="n">round</div></div>
  </div>
</body>
</html>
