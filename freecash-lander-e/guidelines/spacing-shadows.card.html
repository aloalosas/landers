<!-- @dsCard group="Spacing" viewport="700x200" name="Shadows & glows" subtitle="Neon green glow + gold/apple shadows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="../styles.css" rel="stylesheet">
<style>
  body { margin:0; background:var(--fc-bg); color:var(--fc-white); font-family:var(--font-sans); padding:30px 24px; }
  .row { display:flex; gap:30px; align-items:center; flex-wrap:wrap; }
  .sw { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .box { width:96px; height:56px; border-radius:var(--r-lg); background:var(--fc-surface-1); border:1px solid var(--fc-line); }
  .green { background:var(--fc-green); border:none; }
  .gold { background:linear-gradient(to bottom,var(--fc-gold-bright),var(--fc-gold)); border:none; }
  .apple { background:var(--fc-apple-blue); border:none; }
  .n { font-size:11px; color:var(--fc-text-mute); font-family:var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="box green" style="box-shadow:var(--glow-md);"></div><div class="n">--glow-md</div></div>
    <div class="sw"><div class="box green" style="box-shadow:var(--glow-xl);"></div><div class="n">--glow-xl</div></div>
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-card);"></div><div class="n">--shadow-card</div></div>
    <div class="sw"><div class="box gold" style="box-shadow:var(--shadow-gold);"></div><div class="n">--shadow-gold</div></div>
    <div class="sw"><div class="box apple" style="box-shadow:var(--shadow-apple);"></div><div class="n">--shadow-apple</div></div>
  </div>
</body>
</html>
