<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="../styles.css" rel="stylesheet">
<style>
  body { margin:0; background:var(--fc-bg); color:var(--fc-white); font-family:var(--font-sans); padding:24px; display:flex; flex-direction:column; gap:12px; }
  .lead { font-size:16px; line-height:1.5; font-weight:400; color:var(--fc-text-mute); max-width:560px; }
  .lead b { color:#fff; font-weight:600; }
  .label { font-size:14px; font-weight:500; color:#fff; }
  .eyebrow { font-size:14px; font-weight:600; color:var(--fc-green); text-transform:uppercase; letter-spacing:1px; }
  .cap { font-size:11px; color:var(--fc-text-faint); }
  .tag { font-size:11px; color:var(--fc-text-mute); font-family:var(--font-mono); }
</style>
</head>
<body>
  <div class="eyebrow">Required: Select Your Age</div>
  <p class="lead"><b>Watch Netflix. Scroll TikTok. Take a walk.</b> Earn cash just by engaging with daily offers you can do any time.</p>
  <div class="label">Question label · 14px / 500</div>
  <div class="cap">Caption / fine print · 11px / 400 · #666</div>
  <div class="tag">--text-lg · --text-base · --text-xs · --ls-wider</div>
</body>
</html>
