<!-- @dsCard group="Components" viewport="700x430" name="Forms — Option cards & gate-select" subtitle="Selectable cards + the glowing age gate" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="../../styles.css" rel="stylesheet">
<style>
  body { margin:0; background:var(--fc-bg); background-image:var(--bg-page-image); color:#fff; font-family:var(--font-sans); padding:30px; }
  .grid { display:flex; flex-direction:column; gap:14px; max-width:440px; margin:0 auto; }
  .lbl { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--fc-text-faint); margin-bottom:4px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="../../ds-preview-runtime.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { OptionCard, Select } = window.FreecashLanderDesignSystem_05d09e;
  function Demo(){
    const [sel, setSel] = React.useState('over21');
    const [age, setAge] = React.useState('');
    return (
      <div className="grid">
        <div className="lbl">Option cards</div>
        <OptionCard title="I'm over 21" desc="Instant payouts: PayPal, CashApp, Crypto" selected={sel==='over21'} onSelect={()=>setSel('over21')} />
        <OptionCard title="I'm under 21" desc="Limited payouts: Wire transfer only" selected={sel==='under21'} onSelect={()=>setSel('under21')} />
        <div className="lbl" style={{marginTop:14}}>Glowing gate-select</div>
        <Select value={age} onChange={(e)=>setAge(e.target.value)} placeholder="Choose your age…"
          options={[{value:'over21',label:"I'm over 21"},{value:'under21',label:"I'm under 21"}]} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
