<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<div id="root"></div>
<script type="text/babel">
  const { StatPill, ReviewStars, Timeline } = window.FreecashLanderDesignSystem_05d09e;

    return (
      <div className="grid">
        <ReviewStars rating={4.6} text="4.6 (1K Ratings)" />

          <div className="lbl">Stat pills</div>
          <div className="row">

            {title:'Device Verified', detail:'iPhone/Android Ready', done:true},
            {title:'Install & Register', detail:'Takes less than 60 seconds'},

  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
