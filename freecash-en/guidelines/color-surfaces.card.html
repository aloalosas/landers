<!-- @dsCard group="Colors" viewport="700x200" name="Surfaces & lines" subtitle="Near-black layered surfaces and border greys" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="../styles.css" rel="stylesheet">
<style>
  body { margin:0; background:var(--fc-bg); color:var(--fc-white); font-family:var(--font-sans); padding:22px; }
  .row { display:flex; gap:14px; flex-wrap:wrap; }
  .sw { display:flex; flex-direction:column; gap:8px; }
  .chip { width:128px; height:76px; border-radius:var(--r-lg); border:1px solid var(--fc-line); }
  .name { font-size:12px; font-weight:600; }
  .hex { font-size:11px; color:var(--fc-text-mute); font-family:var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--fc-bg);"></div><div class="name">--fc-bg</div><div class="hex">#0A0A0A page</div></div>
    <div class="sw"><div class="chip" style="background:var(--fc-bg-panel);"></div><div class="name">--fc-bg-panel</div><div class="hex">#141414 panel</div></div>
    <div class="sw"><div class="chip" style="background:var(--fc-surface-1);"></div><div class="name">--fc-surface-1</div><div class="hex">#1A1A1A card</div></div>
    <div class="sw"><div class="chip" style="background:var(--fc-surface-2);"></div><div class="name">--fc-surface-2</div><div class="hex">#222 hover</div></div>
    <div class="sw"><div class="chip" style="background:var(--fc-surface-1); border-color:var(--fc-line-soft);"></div><div class="name">--fc-line / soft</div><div class="hex">#333 · #444</div></div>
  </div>
</body>
</html>
