<!-- @dsCard group="Type" viewport="700x230" name="Display headlines" subtitle="Inter 800 hero + green slanted highlight" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="../styles.css" rel="stylesheet">
<style>
  body { margin:0; background:var(--fc-bg); color:var(--fc-white); font-family:var(--font-sans); padding:24px; }
  .hero { font-size:40px; line-height:1.1; font-weight:800; letter-spacing:-1px; margin:0 0 6px; }
  .hl { color:var(--fc-bg); background:var(--fc-green); padding:0 10px; border-radius:6px; display:inline-block; transform:rotate(-2deg); }
  .meta { font-size:11px; color:var(--fc-text-mute); font-family:var(--font-mono); margin-top:14px; }
  . small { font-size:12px; color:var(--fc-text-mute); }
</style>
</head>
<body>
  <h1 class="hero">Get Paid for <span class="hl">Everyday Stuff</span></h1>
  <div class="small">Inter / 800 · 40px · -1px tracking · highlight rotate −2°</div>
  <div class="meta">--text-5xl · --fw-extrabold · --font-sans</div>
</body>
</html>
