<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="../styles.css" rel="stylesheet">
<style>
  body { margin:0; font-family:var(--font-sans); }
  .stage {
    height:180px;
    background-color:var(--fc-bg);
    background-image:var(--bg-page-image);
    display:flex; align-items:center; justify-content:center;
  }
  .tag { color:var(--fc-text-mute); font-family:var(--font-mono); font-size:12px; background:rgba(0,0,0,.4); padding:6px 12px; border-radius:6px; border:1px solid var(--fc-line); }
</style>
</head>
<body>
  <div class="stage"><span class="tag">--bg-page-image · linear-gradient + green cross SVG @ 5% opacity</span></div>
</body>
</html>
