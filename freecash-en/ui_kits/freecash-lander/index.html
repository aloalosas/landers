<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freecash — Get Paid Real Money</title>
<link href="../../styles.css" rel="stylesheet">
<style>
  html, body { margin:0; }
  body {
    background-color:var(--fc-bg);
    background-image:var(--bg-page-image);
    color:var(--fc-white);
    font-family:var(--font-sans);
    min-height:100vh;
    display:flex; justify-content:center; align-items:flex-start;
    padding:24px 15px;
    -webkit-font-smoothing:antialiased;
  }
  .fc-container { width:100%; max-width:480px; display:flex; flex-direction:column; gap:20px; }
  .fc-step { display:flex; flex-direction:column; gap:15px; width:100%; animation:fc-fadeIn .5s var(--ease-out); }

  .fc-header { display:flex; justify-content:space-between; align-items:center; padding:0 5px; }
  .fc-hero { text-align:left; padding:6px 5px; display:flex; flex-direction:column; gap:12px; }

  .fc-h1 { font-size:40px; line-height:1.1; font-weight:800; letter-spacing:-1px; margin:0; color:#fff; }
  .fc-hl { color:var(--fc-bg); background:var(--fc-green); padding:0 10px; border-radius:6px; display:inline-block; transform:rotate(-2deg); margin-left:-5px; }
  .fc-sub { font-size:16px; color:var(--fc-text-mute); line-height:1.5; margin:0; }
  .fc-sub b { color:#fff; font-weight:600; }

  .fc-stats { display:flex; flex-wrap:wrap; gap:10px; }
  .fc-instruction { text-align:center; color:#fff; font-size:16px; font-weight:600; margin-top:10px; animation:fc-bounce 2s infinite; }
  .fc-interaction { display:flex; flex-direction:column; gap:12px; margin-top:6px; }
  .fc-eyebrow { font-size:14px; font-weight:600; color:var(--fc-green); text-transform:uppercase; letter-spacing:1px; display:flex; align-items:center; gap:8px; }
  .fc-eyebrow::before { content:'→'; font-size:16px; }
  .fc-age-desc { margin-top:4px; padding:15px 20px; background:rgba(0,211,105,.05); border-left:3px solid var(--fc-green); border-radius:8px; font-size:14px; color:var(--fc-text-mute); line-height:1.6; animation:fc-fadeIn .3s var(--ease-out); }
  .fc-age-desc strong { color:var(--fc-green); font-weight:600; }

  /* Step 2 success */
  .fc-headline-row { display:flex; align-items:center; gap:15px; }
  .fc-success-icon { width:48px; height:48px; flex-shrink:0; border:2px solid var(--fc-green); border-radius:50%; display:flex; align-items:center; justify-content:center; }
  .fc-youre-in { font-size:46px; font-weight:700; color:#fff; line-height:1; margin:0; display:flex; align-items:center; gap:10px; }
  .fc-in-block { background:var(--fc-green); color:#000; padding:4px 12px; border-radius:6px; transform:rotate(-3deg); display:inline-block; font-weight:800; }

  .fc-restart { align-self:center; margin-top:6px; background:none; border:none; color:var(--fc-text-faint); font-family:var(--font-sans); font-size:13px; cursor:pointer; padding:6px; }
  .fc-restart:hover { color:var(--fc-text-mute); }

  @media (max-width:400px){
    .fc-h1 { font-size:34px; }
    .fc-youre-in { font-size:36px; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="../../ds-preview-runtime.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Step1.jsx"></script>
<script type="text/babel" src="Step2.jsx"></script>
<script type="text/babel" src="LanderApp.jsx"></script>
<script type="text/babel">
  function fcMount(){
    if (!window.LanderApp || !window.Step1) { return setTimeout(fcMount, 30); }
    try {
      ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(window.LanderApp));
    } catch(e){ console.log("FC mount error:", e && e.message); }
  }
  fcMount();
</script>
</body>
</html>
