<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="~5px rhythm — gaps & padding" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="../styles.css" rel="stylesheet">
<style>
  body { margin:0; background:var(--fc-bg); color:var(--fc-white); font-family:var(--font-sans); padding:24px; }
  .row { display:flex; align-items:flex-end; gap:18px; }
  .sw { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .bar { background:var(--fc-green); border-radius:3px; width:24px; }
  .n { font-size:11px; color:var(--fc-text-mute); font-family:var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="bar" style="height:5px;"></div><div class="n">3·5</div></div>
    <div class="sw"><div class="bar" style="height:8px;"></div><div class="n">4·8</div></div>
    <div class="sw"><div class="bar" style="height:12px;"></div><div class="n">6·12</div></div>
    <div class="sw"><div class="bar" style="height:15px;"></div><div class="n">7·15</div></div>
    <div class="sw"><div class="bar" style="height:20px;"></div><div class="n">9·20</div></div>
    <div class="sw"><div class="bar" style="height:25px;"></div><div class="n">11·25</div></div>
    <div class="sw"><div class="bar" style="height:30px;"></div><div class="n">12·30</div></div>
    <div class="sw"><div class="bar" style="height:40px;"></div><div class="n">13·40</div></div>
  </div>
</body>
</html>
