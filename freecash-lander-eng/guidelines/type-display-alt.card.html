<!-- @dsCard group="Type" viewport="700x210" name="Montserrat & numerals" subtitle="Viral display + big-money numerals + mono timer" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="../styles.css" rel="stylesheet">
<style>
  body { margin:0; background:var(--fc-bg); color:var(--fc-white); font-family:var(--font-sans); padding:24px; display:flex; align-items:center; gap:40px; flex-wrap:wrap; }
  .viral { font-family:var(--font-display); font-weight:900; font-size:32px; line-height:1.2; text-transform:capitalize; }
  .viral u { text-decoration-color:var(--fc-gold); text-underline-offset:4px; }
  .mega { font-size:60px; font-weight:800; letter-spacing:-2px; line-height:1; color:#fff; }
  .timer { display:flex; gap:5px; font-family:var(--font-mono); font-size:24px; font-weight:700; }
  .unit { background:#000; padding:4px 8px; border-radius:4px; border:1px solid var(--fc-line); }
  .col { display:flex; flex-direction:column; gap:8px; }
  .t { font-size:11px; color:var(--fc-text-mute); font-family:var(--font-mono); }
</style>
</head>
<body>
  <div class="col">
    <div class="viral">Make <u>Real Money</u></div>
    <div class="t">Montserrat / 900</div>
  </div>
  <div class="col">
    <div class="mega">$750</div>
    <div class="t">--text-7xl · -2px</div>
  </div>
  <div class="col">
    <div class="timer"><span class="unit">0</span><span class="unit">4</span>:<span class="unit">5</span><span class="unit">9</span></div>
    <div class="t">--font-mono</div>
  </div>
</body>
</html>
