<!-- @dsCard group="Brand" viewport="700x170" name="Logo treatment" subtitle="Text wordmark + pulsing green status dot (no graphic logo in source)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="../styles.css" rel="stylesheet">
<style>
  body { margin:0; background:var(--fc-bg); color:var(--fc-white); font-family:var(--font-sans); padding:30px 24px; display:flex; gap:48px; align-items:center; flex-wrap:wrap; }
  .badge { font-weight:700; font-size:14px; letter-spacing:.5px; color:var(--fc-green); text-transform:uppercase; display:flex; align-items:center; gap:8px; }
  .badge::before { content:''; width:8px; height:8px; background:var(--fc-green); border-radius:50%; box-shadow:var(--glow-dot); }
  .badge.white { color:#fff; }
  .badge.white::before { background:#fff; box-shadow:0 0 10px #fff; }
  .n { font-size:11px; color:var(--fc-text-mute); font-family:var(--font-mono); margin-top:10px; }
  .col { display:flex; flex-direction:column; }
</style>
</head>
<body>
  <div class="col"><div class="badge">Freecash App</div><div class="n">.logo-badge · brand</div></div>
  <div class="col"><div class="badge white">Step Complete</div><div class="n">.logo-badge · white</div></div>
</body>
</html>
